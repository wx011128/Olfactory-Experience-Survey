<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | 第二段階実験</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/">
        <span>Olfactory Gallery Study</span>
      </a>
      <nav>
        <a href="/">Form</a>
        <a href="/evaluation.html">Evaluation</a>
        <a href="/api/responses.csv">CSV Download</a>
      </nav>
      <div class="header-progress" aria-hidden="true">
        <span></span>
      </div>
    </header>
    <main class="shell">
      <section class="hero compact">
        <h1>回答データ</h1>
        <p>保存された回答を確認し、CSVとしてダウンロードできます。</p>
      </section>
      <div class="admin-actions">
        <a class="secondary-button" href="/api/responses.csv">CSVをダウンロード</a>
      </div>
      <section class="card admin-card">
        <div class="admin-toolbar">
          <strong id="responseCount">0件</strong>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日時</th>
                <th>参加者</th>
                <th>順序</th>
                <th>適合</th>
                <th>印象変化</th>
                <th>自由記述</th>
              </tr>
            </thead>
            <tbody id="responseRows"></tbody>
          </table>
        </div>
      </section>
    </main>
    <script src="./admin.js"></script>
  </body>
</html>
